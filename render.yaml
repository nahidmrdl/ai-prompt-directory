databases:
  - name: prompt-db
    plan: free
    databaseName: prompts
    user: prompts_user

services:
  - type: web
    name: ai-prompt-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prompt-db
          property: connectionURI
      - key: DEBUG
        value: "false"
